<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>نونو - مساعد أكاديمية نور للجمباز</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --pink:       #e91e8c;
    --pink-dark:  #c0166f;
    --pink-light: #fce4f3;
    --rose:       #ff6eb4;
    --bg:         #fff5fb;
    --white:      #ffffff;
    --gray-text:  #555;
    --border:     #f5c6e3;
    --shadow:     rgba(233,30,140,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .chat-wrapper { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 16px; }
  .header {
    background: var(--white); border-radius: 24px; padding: 24px 28px;
    display: flex; align-items: center; gap: 18px;
    box-shadow: 0 4px 24px var(--shadow); border: 1px solid var(--border);
  }
  .header-avatar {
    width: 64px; height: 64px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--pink), var(--rose));
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fff; box-shadow: 0 4px 16px var(--shadow);
    animation: pulse 3s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 4px 16px var(--shadow); }
    50%      { box-shadow: 0 4px 28px rgba(233,30,140,.35); }
  }
  .header-info h1 { font-size: 1.4rem; font-weight: 800; color: #1a1a1a; }
  .header-info p  { font-size: .88rem; color: var(--gray-text); margin-top: 2px; }
  .online-badge {
    margin-right: auto; background: #e8f5e9; color: #388e3c;
    font-size: .78rem; font-weight: 700; padding: 4px 12px; border-radius: 20px;
    display: flex; align-items: center; gap: 6px;
  }
  .online-badge::before {
    content: ''; width: 8px; height: 8px; background: #4caf50;
    border-radius: 50%; animation: blink 1.4s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .chat-box {
    background: var(--white); border-radius: 24px;
    box-shadow: 0 4px 24px var(--shadow); border: 1px solid var(--border);
    overflow: hidden; display: flex; flex-direction: column;
  }
  .messages {
    height: 420px; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
    background: linear-gradient(180deg, #fff9fd 0%, #fff5fb 100%);
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  .msg { display: flex; gap: 10px; align-items: flex-end; animation: fadeUp .3s ease; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 36px; height: 36px; flex-shrink: 0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #fff;
  }
  .bot  .msg-avatar { background: linear-gradient(135deg, var(--pink), var(--rose)); }
  .user .msg-avatar { background: linear-gradient(135deg, #7c3aed, #a855f7); }
  .bubble {
    max-width: 72%; padding: 12px 16px; border-radius: 20px;
    font-size: .93rem; line-height: 1.6; word-break: break-word;
  }
  .bot  .bubble {
    background: var(--white); border: 1px solid var(--border);
    border-bottom-right-radius: 6px; color: #222;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .user .bubble {
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    color: #fff; border-bottom-left-radius: 6px;
    box-shadow: 0 4px 12px var(--shadow);
  }
  .wa-cta {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 10px;
    background: #25d366; color: #fff; padding: 10px 18px; border-radius: 14px;
    font-weight: 700; font-size: .9rem; text-decoration: none;
    transition: transform .2s, box-shadow .2s;
  }
  .wa-cta:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(37,211,102,.4); }
  .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
  .typing-indicator span {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--pink); opacity: .5; animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: .2s; }
  .typing-indicator span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); opacity:.5; }
    50%      { transform: translateY(-6px); opacity:1; }
  }
  .quick-area { padding: 10px 20px 0; display: flex; flex-wrap: wrap; gap: 8px; }
  .quick-btn {
    background: var(--pink-light); color: var(--pink-dark);
    border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px;
    font-size: .82rem; font-family: 'Tajawal', sans-serif;
    cursor: pointer; font-weight: 600; transition: background .2s, transform .2s;
  }
  .quick-btn:hover { background: var(--pink); color: #fff; transform: translateY(-2px); }
  .input-area {
    padding: 14px 20px 18px; display: flex; gap: 10px; align-items: center;
    border-top: 1px solid var(--border);
  }
  .input-area input {
    flex: 1; padding: 12px 18px; border: 1.5px solid var(--border);
    border-radius: 30px; font-family: 'Tajawal', sans-serif;
    font-size: .93rem; color: #222; background: var(--bg); outline: none;
    transition: border .2s;
  }
  .input-area input:focus { border-color: var(--pink); background: #fff; }
  .input-area input::placeholder { color: #bbb; }
  .send-btn {
    width: 48px; height: 48px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    border: none; border-radius: 50%; color: #fff; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px var(--shadow); transition: transform .2s, box-shadow .2s;
  }
  .send-btn:hover  { transform: translateY(-2px) scale(1.05); box-shadow: 0 6px 18px var(--shadow); }
  .send-btn:active { transform: scale(.95); }
  .send-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
  .footer { text-align: center; font-size: .82rem; color: #aaa; padding-bottom: 8px; }
  .footer a { color: var(--pink); text-decoration: none; font-weight: 700; }
</style>
</head>
<body>
<div class="chat-wrapper">
  <div class="header">
    <div class="header-avatar"><i class="fas fa-medal"></i></div>
    <div class="header-info">
      <h1>نونو 🤸‍♀️</h1>
      <p>مساعد أكاديمية نور للجمباز الفني</p>
    </div>
    <div class="online-badge">متصل الآن</div>
  </div>
  <div class="chat-box">
    <div class="messages" id="messages"></div>
    <div class="quick-area">
      <button class="quick-btn">💰 كم السعر؟</button>
      <button class="quick-btn">🕐 المواعيد؟</button>
      <button class="quick-btn">👧 من سن كام؟</button>
      <button class="quick-btn">👗 اللبس إيه؟</button>
      <button class="quick-btn">🏆 حصص تجريبية؟</button>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." autocomplete="off">
      <button class="send-btn" id="sendBtn" title="إرسال">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>
  <div class="footer">
    تواصل مباشر ☎️ <a href="https://wa.me/201062559830" target="_blank">+201062559830</a>
    &nbsp;|&nbsp; أكاديمية نور للجمباز الفني
  </div>
</div>

<script>
/* ── CONFIG ── */
const WA_LINK = "https://wa.me/201062559830";

/* ── KNOWLEDGE BASE ── */
const KNOWLEDGE = [
  { q:"إيه هي فوايد الجمباز للأطفال؟",
    a:"الجمباز الفني للبنات بيبني جسم قوي ومرن، وبيعلمهم الثقة في النفس والانضباط. دي بداية ممتازة لمستقبل أي بطلة!",
    keys:["فوايد","فائدة","مفيد","فايدة","تأثير","ايه بيعمل"] },
  { q:"إيه هو السن المناسب لتدريب الجمباز؟",
    a:"بنقبل البنات من سن 4 سنين لحد 14 سنة. السن المثالي للبطولات هو من 4 لـ 10 سنين. الأكاديمية متخصصة في الجمباز الفني للبنات فقط.",
    keys:["سن","عمر","سنة","كام سنة","بداية","صغيرة","كبيرة","اعمار","مناسب"] },
  { q:"إيه هي مواعيد التمرين؟",
    a:"المواعيد هي الأحد والثلاثاء والخميس، بتختاري منهم يومين. التمرين من 6 مساءً لـ 8 مساءً.",
    keys:["مواعيد","وقت","ايام","امتى","ميعاد","توقيت","ساعة","جدول"] },
  { q:"تكلفة الاشتراك كام؟",
    a:"عندنا باقتين:\n🌸 الباقة الترفيهية: 8 حصص بـ 300 جنيه\n🏆 باقة البطل: 12 حصة بـ 400 جنيه\nالاشتراك شهري والحصص لا ترحل.",
    keys:["سعر","تكلفة","بكام","كام","مبلغ","اشتراك","باقة","ثمن","فلوس","رسوم","بكم"] },
  { q:"اللبس المطلوب إيه؟",
    a:"في أول حصة أي لبس رياضي مريح مناسب. بعد كده بيكون فيه زي موحد للأكاديمية (تيشيرت) بسعر 250 جنيه.",
    keys:["لبس","زي","ملابس","تيشيرت","هدوم","يلبس","لازم يجيب","الملبس"] },
  { q:"بتقدموا حصص تجريبية؟",
    a:"أكيد! أول حصة بتكون تجريبية عشان نقيّم مستوى اللاعبة ونتعرف عليها.",
    keys:["تجريبية","تجربة","أول حصة","مجانية","جرب","اختبار","trial"] },
  { q:"مين المدربين وإيه خبرتهم؟",
    a:"المدربة هي كابتن نور، مدربة معتمدة من الاتحاد المصري للجمباز، وخبرتها في تدريب البنات على الجمباز الفني.",
    keys:["مدرب","مدربة","كابتن","نور","خبرة","مين اللي","trainer"] },
  { q:"هل المدربة معاها شهادات؟",
    a:"طبعاً! كابتن نور حاصلة على:\n- شهادة مدرب معتمد من Insep Pro في التدريب الشخصي\n- دورة إعداد مدربين جمباز فني من الاتحاد المصري للجمباز\n- بكالريوس علوم الرياضة\n- حالياً باحثة ماجستير في قسم التدريب",
    keys:["شهادة","مؤهل","معتمد","تعليم","دراسة","درجة","تدريب","كفاءة"] },
  { q:"الأكاديمية آمنة؟",
    a:"سلامة اللاعبات أولويتنا. الصالة مجهزة بأحدث معايير الأمان: أرضيات مبطنة وأجهزة معتمدة.",
    keys:["أمان","آمن","سلامة","خطر","تأمين","صالة","ضمان"] },
  { q:"هل شاركتوا في بطولات؟",
    a:"أكيد! أكاديمية نور بتشارك دايماً في بطولات الجمهورية والمناطق، وبطلاتنا بيحققوا مراكز متقدمة الحمد لله.",
    keys:["بطولة","مسابقة","بطولات","مراكز","نتايج","فازوا","championship"] },
  { q:"هل أقدر أسترد الاشتراك؟",
    a:"للأسف لا، بعد دفع المبلغ بيدخل في دائرة حسابية وإدارية يصعب معها استرداد المبلغ تاني.",
    keys:["استرداد","استرجاع","رجوع","كنسل","الغاء","وقف","تجميد","refund"] },
];

/* ── STAGE 1: Direct keyword search ── */
function searchKnowledge(userText) {
  const text = userText.toLowerCase().trim();
  let best = null, top = 0;
  KNOWLEDGE.forEach(item => {
    let score = 0;
    item.keys.forEach(k => { if (text.includes(k)) score += 3; });
    item.q.toLowerCase().split(" ").forEach(w => { if (w.length > 2 && text.includes(w)) score += 1; });
    if (score > top) { top = score; best = item; }
  });
  return top >= 3 ? best.a : null;
}

/* ── STAGE 2: Gemini AI ── */
const GEMINI_API_KEY = "AIzaSyCENKrIphUGX_bA7XgcqqInVc_ZhkA3TY"; // 🔑 ضع مفتاحك هنا

async function askGemini(userMsg) {
  const knowledgeBlock = KNOWLEDGE.map((k,i) =>
    `[${i+1}] سؤال: ${k.q}\nجواب: ${k.a}`
  ).join("\n\n");

  const systemPrompt = `أنت "نونو"، مساعد ذكي ودود لأكاديمية نور للجمباز الفني للبنات في مصر.
تحدث دائماً بالعامية المصرية وكن مرحاً ومشجعاً.

## قاعدة معرفة الأكاديمية:
${knowledgeBlock}

## تعليماتك:
1. إذا كان السؤال عن الأكاديمية أو اشتراكاتها أو مواعيدها → ابحث في قاعدة المعرفة وأجب منها حتى لو جاء بصياغة مختلفة أو غير مباشرة.
2. إذا كان السؤال عن الجمباز أو الرياضة عموماً → أجب بمعلومة مفيدة وادمج ذكراً لطيفاً للأكاديمية.
3. إذا كانت الرسالة دردشة عادية عن الجمباز أو الرياضة → دردش بشكل طبيعي ومفيد.
4. إذا كان الموضوع خارج الجمباز والرياضة تماماً → قل بلطف: "أنا متخصص في الجمباز وبصراحة مش هينفع أساعدك في ده، بس لو عندك أي سؤال عن الجمباز أو الأكاديمية أنا هنا 🤸‍♀️"
5. إذا لم تجد إجابة لسؤال خاص بالأكاديمية → أرجع النص التالي فقط بدون أي إضافة: ##TRANSFER##
6. كن مختصراً: جملتين أو ثلاثة كحد أقصى إلا عند تعداد نقاط.`;

  // دمج الـ system prompt مع السؤال في رسالة واحدة (Gemini لا يدعم system prompt منفصل في REST)
  const fullPrompt = systemPrompt + "\n\nسؤال المستخدم: " + userMsg;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: fullPrompt }] }],
        generationConfig: { maxOutputTokens: 500, temperature: 0.7 }
      })
    }
  );

  if (!res.ok) throw new Error("Gemini error " + res.status);
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "##TRANSFER##";
}

/* ── DOM HELPERS ── */
const messagesEl = document.getElementById("messages");
const inputEl    = document.getElementById("userInput");
const sendBtn    = document.getElementById("sendBtn");

function addMsg(html, isUser=false) {
  const row = document.createElement("div");
  row.className = "msg " + (isUser ? "user" : "bot");
  const avatar = document.createElement("div");
  avatar.className = "msg-avatar";
  avatar.innerHTML = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = html;
  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "msg bot"; row.id = "typing-row";
  row.innerHTML = `<div class="msg-avatar"><i class="fas fa-robot"></i></div>
    <div class="bubble"><div class="typing-indicator">
      <span></span><span></span><span></span>
    </div></div>`;
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById("typing-row");
  if (el) el.remove();
}

function textToHTML(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n/g, "<br>");
}

function buildTransferMsg() {
  return `معنديش معلومة كافية عن ده، بس كابتن نور هتساعدك على طول! 😊<br><br>
    <a class="wa-cta" href="${WA_LINK}" target="_blank">
      <i class="fab fa-whatsapp"></i> تحدث مع كابتن نور مباشرة
    </a>`;
}

/* ── MAIN HANDLER ── */
async function handleSend() {
  const text = inputEl.value.trim();
  if (!text) return;

  addMsg(text, true);
  inputEl.value = "";
  sendBtn.disabled = true;
  showTyping();

  try {
    // Stage 1: direct keyword search
    let answer = searchKnowledge(text);

    if (!answer) {
      // Stage 2: Claude AI for smart matching + chat
      const aiReply = await askGemini(text);
      if (aiReply.includes("##TRANSFER##")) {
        // Stage 3: transfer to WhatsApp
        answer = buildTransferMsg();
      } else {
        answer = textToHTML(aiReply);
      }
    } else {
      answer = textToHTML(answer);
    }

    hideTyping();
    addMsg(answer);

  } catch (err) {
    console.error(err);
    hideTyping();
    addMsg(buildTransferMsg());
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

/* ── EVENTS ── */
sendBtn.addEventListener("click", handleSend);
inputEl.addEventListener("keydown", e => { if (e.key === "Enter") handleSend(); });
document.querySelectorAll(".quick-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    inputEl.value = btn.textContent.replace(/[\u{1F000}-\u{1FFFF}💰🕐👧👗🏆\s]+/gu, "").trim();
    handleSend();
  });
});

/* ── WELCOME ── */
window.addEventListener("load", () => {
  addMsg("أهلاً وسهلاً! أنا <strong>نونو</strong>، مساعدك في أكاديمية نور للجمباز الفني 🤸‍♀️<br><br>أقدر أجاوبك على أي سؤال عن الأكاديمية، الاشتراكات، المواعيد، أو الجمباز بشكل عام.<br><br>قولي إزاي أقدر أساعدك؟ 💖");
  inputEl.focus();
});
</script>
</body>
</html>
